name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false  # Never cancel deploys

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: easytrip-api
  ECS_CLUSTER_STAGING: easytrip-staging
  ECS_CLUSTER_PROD: easytrip-production
  ECS_SERVICE_STAGING: easytrip-api-staging
  ECS_SERVICE_PROD: easytrip-api-production
  CONTAINER_NAME: easytrip-api

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')

    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest

      - name: Run DB migrations (staging)
        run: |
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER_STAGING }} \
            --task-definition easytrip-migrate \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.STAGING_SUBNET_IDS }}],securityGroups=[${{ secrets.STAGING_SG_ID }}],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"migrate\",\"environment\":[{\"name\":\"IMAGE_TAG\",\"value\":\"${{ github.sha }}\"}]}]}" \
            --wait-for-completion

      - name: Deploy to ECS (staging)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER_STAGING }} \
            --service ${{ env.ECS_SERVICE_STAGING }} \
            --force-new-deployment \
            --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true},maximumPercent=200,minimumHealthyPercent=100"

      - name: Wait for staging deploy to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER_STAGING }} \
            --services ${{ env.ECS_SERVICE_STAGING }}

  smoke-test-staging:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.easytrip.app/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Staging health check failed after 10 attempts"
          exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-test-staging
    environment: production   # Requires manual approval in GitHub Environments
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image as production
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-ids imageTag=${{ github.sha }} \
            --query 'images[0].imageManifest' \
            --output text)
          aws ecr put-image \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-tag prod-latest \
            --image-manifest "$MANIFEST"

      - name: Run DB migrations (production)
        run: |
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER_PROD }} \
            --task-definition easytrip-migrate \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PROD_SUBNET_IDS }}],securityGroups=[${{ secrets.PROD_SG_ID }}],assignPublicIp=DISABLED}" \
            --wait-for-completion

      - name: Deploy to ECS (production) — blue/green
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER_PROD }} \
            --service ${{ env.ECS_SERVICE_PROD }} \
            --force-new-deployment \
            --deployment-configuration "deploymentCircuitBreaker={enable=true,rollback=true},maximumPercent=200,minimumHealthyPercent=100"

      - name: Wait for production deploy to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER_PROD }} \
            --services ${{ env.ECS_SERVICE_PROD }}

      - name: Production health check
        run: |
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.easytrip.app/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "❌ Production health check failed"
          exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Deployed ${{ github.sha }} to production"
          # Add Slack/Discord notification here if desired

      - name: Notify on failure
        if: failure()
        run: |
          echo "🔥 Production deploy FAILED for ${{ github.sha }}"
          # Add Slack/Discord alert here
